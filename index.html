<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JaponskГҪ TrГ©ning - Verzia 2.4.1</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

<div id="loadingOverlay"><div class="spinner"></div><h2 id="loadingText" data-sk="NaДҚГӯtavam dГіdЕҫГі..." data-en="Loading dojo...">NaДҚГӯtavam dГіdЕҫГі...</h2></div>

<div id="overlayDetail" class="overlay">
    <div class="overlay-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="detailTitle" style="margin:0;" data-sk="Detail vГҪsledkov" data-en="Result Details">Detail vГҪsledkov</h2>
            <button onclick="closeOverlay('overlayDetail')" style="background:none; border:none; color:var(--text-muted); font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="detailStats" style="margin-bottom:20px; padding:15px; background:var(--bg-dark); border-radius:12px; color:var(--text-muted);"></div>
        <div id="detailList"></div>
    </div>
</div>

<div id="overlayAI" class="overlay">
    <div class="overlay-content" style="border: 2px solid var(--ai-glow);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;" data-sk="вңЁ AI Sensei analГҪza" data-en="вңЁ AI Sensei Analysis">вңЁ AI Sensei analГҪza</h2>
            <button onclick="closeOverlay('overlayAI')" style="background:none; border:none; color:var(--text-muted); font-size:30px; cursor:pointer;">&times;</button>
        </div>
        <div id="aiResponse" style="line-height:1.6; font-size:15px; white-space: pre-wrap;"></div>
        <button class="btn btn-outline" style="margin-top:20px;" onclick="closeOverlay('overlayAI')" data-sk="Rozumiem" data-en="Got it">Rozumiem</button>
    </div>
</div>

<div id="auth-container" class="app-container" style="display:none; max-width:400px;">
    <h2 style="text-align:center; font-size:32px;">рҹҸҜ DГіdЕҫГі</h2>
    <p style="color:var(--text-muted); text-align:center; margin-bottom:20px;" data-sk="PrihlГЎs sa pre ukladanie postupu." data-en="Sign in to save progress.">PrihlГЎs sa pre ukladanie postupu.</p>
    <input type="email" id="authEmail" placeholder="Email" data-sk="Email" data-en="Email">
    <input type="password" id="authPass" placeholder="Heslo" data-sk="Heslo" data-en="Password">
    <button class="btn btn-primary" onclick="loginUser()" data-sk="VstГәpiЕҘ" data-en="Enter">VstГәpiЕҘ</button>
    <button class="btn btn-outline" style="margin-top:10px;" onclick="registerUser()" data-sk="VytvoriЕҘ ГәДҚet" data-en="Create Account">VytvoriЕҘ ГәДҚet</button>
    <p id="authError" style="color:var(--danger); text-align:center; margin-top:15px; font-weight:bold;"></p>
</div>

<div id="main-app" class="app-container" style="display:none;">
    <div class="topbar">
        <div style="flex:1;">
            <div style="display:flex; gap:15px; margin-bottom:5px;">
                <div class="rpg-stat"><div class="rpg-val" id="uiRank">рҹҘ· Genin</div><div class="rpg-label" data-sk="HodnosЕҘ" data-en="Rank">HodnosЕҘ</div></div>
                <div class="rpg-stat"><div class="rpg-val" id="uiLevel">1</div><div class="rpg-label" data-sk="Level" data-en="Level">Level</div></div>
                <div class="rpg-stat"><div class="rpg-val" id="uiStreak">0 рҹ”Ҙ</div><div class="rpg-label" data-sk="Streak" data-en="Streak">Streak</div></div>
            </div>
            <div class="xp-bar-container"><div id="xpBar" class="xp-bar-fill"></div></div>
        </div>
        <div class="lang-flags" style="margin-left:20px;"><span id="flag-sk" onclick="setLang('sk')">рҹҮёрҹҮ°</span><span id="flag-en" onclick="setLang('en')">рҹҮ¬рҹҮ§</span></div>
    </div>

    <div class="nav">
        <button class="btn-nav active" onclick="switchTab('map')" id="btnTabMap" data-sk="рҹ—әпёҸ Mapa" data-en="рҹ—әпёҸ Map">рҹ—әпёҸ Mapa</button>
        <button class="btn-nav" onclick="switchTab('learn')" id="btnTabLearn" data-sk="рҹҺҙ UДҚenie" data-en="рҹҺҙ Learn">рҹҺҙ UДҚenie</button>
        <button class="btn-nav" onclick="switchTab('train')" id="btnTabTrain" data-sk="рҹ“қ Test" data-en="рҹ“қ Test">рҹ“қ Test</button>
        <button class="btn-nav" onclick="switchTab('translate')" id="btnTabTranslate" data-sk="рҹҲҜ AI Preklad" data-en="рҹҲҜ AI Translate">рҹҲҜ AI Preklad</button>
        <button class="btn-nav" onclick="switchTab('sensei')" id="btnTabSensei" data-sk="рҹ§ҷвҖҚвҷӮпёҸ Sensei" data-en="рҹ§ҷвҖҚвҷӮпёҸ Sensei">рҹ§ҷвҖҚвҷӮпёҸ Sensei</button>
        <button class="btn-nav" onclick="switchTab('profile')" id="btnTabProfile" data-sk="рҹ‘Ө Profil" data-en="рҹ‘Ө Profile">рҹ‘Ө Profil</button>
    </div>

    <div id="tab-map" class="tab active"><h2 style="margin-top:0;" data-sk="Tvoja cesta" data-en="Your Path">Tvoja cesta</h2><div id="lessonMap" class="map-grid"></div></div>

    <div id="tab-learn" class="tab">
        <div id="learnSetup">
            <h2 data-sk="UДҚebnГ© materiГЎly" data-en="Learning Materials">UДҚebnГ© materiГЎly</h2>
            <div class="info-box"><label style="font-size:12px; color:var(--text-muted);" data-sk="VYBER LEKCIU:" data-en="SELECT LESSON:">VYBER LEKCIU:</label><select id="learnLessonSelect" style="margin-top:5px;"></select><button class="btn btn-primary" onclick="startLearn('cards')" data-sk="SpustiЕҘ kartiДҚky" data-en="Start Flashcards">SpustiЕҘ kartiДҚky</button></div>
            <button class="btn btn-outline" onclick="showUnlockedList()" data-sk="OtvoriЕҘ mГҙj slovnГӯk" data-en="Open My Dictionary">OtvoriЕҘ mГҙj slovnГӯk</button>
        </div>
        <div id="learnCardsRun" class="hidden">
            <div class="test-header"><span id="fcProgress"></span></div>
            <div class="flashcard-container" onclick="flipCard()"><div class="flashcard" id="fcElement"><div class="card-face card-front"><div id="fcImg" style="font-size:50px; margin-bottom:10px;"></div><div id="fcFrontSk" style="font-size:28px; font-weight:800;"></div></div><div class="card-face card-back"><div id="fcBackRomaji" style="font-size:24px; color:var(--primary); font-weight:bold;"></div><div id="fcBackKana" style="font-size:20px;"></div><div id="fcBackKanji" style="font-size:32px; margin-top:10px;"></div></div></div></div>
            <div style="text-align:center; margin-bottom:15px;"><button class="btn btn-audio" onclick="playCurrentAudioFC()" data-sk="рҹ”Ҡ VypoДҚuЕҘ si" data-en="рҹ”Ҡ Listen">рҹ”Ҡ VypoДҚuЕҘ si</button></div>
            <div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="prevFc()" data-sk="SpГӨЕҘ" data-en="Back">SpГӨЕҘ</button><button class="btn btn-success" onclick="nextFc()" data-sk="ДҺalЕЎia" data-en="Next">ДҺalЕЎia</button></div>
            <button class="btn btn-outline" style="margin-top: 15px; border: none;" onclick="closeLearn()" data-sk="UkonДҚiЕҘ uДҚenie" data-en="End Learning">UkonДҚiЕҘ uДҚenie</button>
        </div>
        <div id="learnListRun" class="hidden"><div id="vocabListBody" style="overflow-y:auto; max-height:60vh;"></div></div>
    </div>

    <div id="tab-train" class="tab">
        <div id="trainSetup">
            <div style="display:flex; gap:5px; margin-bottom:15px;"><button class="btn-nav" id="btnModeUnlock" onclick="selectTestModeUI('unlock')" data-sk="рҹ”“ Postup" data-en="рҹ”“ Progression">рҹ”“ Postup</button><button class="btn-nav" id="btnModeQuiz" onclick="selectTestModeUI('quiz')" data-sk="вҸұпёҸ KvГӯz" data-en="вҸұпёҸ Quiz">вҸұпёҸ KvГӯz</button><button class="btn-nav" id="btnModeFree" onclick="selectTestModeUI('free')" data-sk="рҹҸӢпёҸ VoДҫnГҪ" data-en="рҹҸӢпёҸ Free">рҹҸӢпёҸ VoДҫnГҪ</button></div>
            <div id="setupUnlock" class="setup-section hidden"><button class="btn btn-primary" onclick="startTraining('unlock')" data-sk="SkГәЕЎka na novГә ГәroveЕҲ" data-en="Level up exam">SkГәЕЎka na novГә ГәroveЕҲ</button></div>
            <div id="setupQuiz" class="setup-section hidden"><div style="display:flex; gap:10px;"><select id="quizFrom"></select><select id="quizTo"></select></div><input type="number" id="quizCount" value="20"><button class="btn btn-warning" onclick="startTraining('quiz')" data-sk="SpustiЕҘ kvГӯz" data-en="Start Quiz">SpustiЕҘ kvГӯz</button></div>
            <div id="setupFree" class="setup-section hidden"><div style="display:flex; gap:10px;"><select id="freeFrom"></select><select id="freeTo"></select></div><input type="number" id="freeCount" value="20"><button class="btn btn-success" onclick="startTraining('free')" data-sk="VoДҫnГҪ trГ©ning" data-en="Free training">VoДҫnГҪ trГ©ning</button></div>
        </div>
        <div id="trainRun" class="hidden">
            <div class="test-header"><span id="testProgress"></span><span id="testScoreDisplay">вң… 0 | вқҢ 0</span></div>
            <div id="quizTimerContainer" class="timer-container hidden"><div id="quizTimerBar" class="timer-bar"></div></div>
            <div id="twWord" class="word-display"></div>
            <div id="twFeedback" class="feedback-box"></div>
            <div id="classicInputArea"><input type="text" id="twInput" autocomplete="off"><button class="btn btn-primary" id="twSubmitBtn" onclick="checkTrainAnswer()" data-sk="PotvrdiЕҘ" data-en="Submit">PotvrdiЕҘ</button></div>
            <div id="quizInputArea" class="quiz-grid hidden"><button class="btn-quiz" id="qb0" onclick="checkQuizAnswer(0)"></button><button class="btn-quiz" id="qb1" onclick="checkQuizAnswer(1)"></button><button class="btn-quiz" id="qb2" onclick="checkQuizAnswer(2)"></button><button class="btn-quiz" id="qb3" onclick="checkQuizAnswer(3)"></button></div>
            <button class="btn btn-success hidden" id="twNextBtn" onclick="nextTrainWord()" data-sk="PokraДҚovaЕҘ" data-en="Continue">PokraДҚovaЕҘ</button>
        </div>
        <div id="trainResult" class="hidden" style="text-align:center;"><h1 id="trScore">0%</h1><p id="trMessage"></p><button id="btnRetryMistakes" class="btn btn-warning hidden" onclick="retryMistakes()" data-sk="рҹҺҜ Chyby" data-en="рҹҺҜ Mistakes">рҹҺҜ Chyby</button><button class="btn btn-primary" onclick="closeTraining()" data-sk="SpГӨЕҘ" data-en="Back">SpГӨЕҘ</button></div>
    </div>

    <div id="tab-sensei" class="tab">
        <h2 data-sk="рҹ§ҷвҖҚвҷӮпёҸ AI Sensei" data-en="рҹ§ҷвҖҚвҷӮпёҸ AI Sensei">рҹ§ҷвҖҚвҷӮпёҸ AI Sensei</h2>
        <div id="senseiSetup" class="info-box"><div style="display:flex; gap:10px; margin-bottom:10px;"><select id="senseiFrom"></select><select id="senseiTo"></select></div><input type="number" id="senseiCount" value="3"><button class="btn btn-primary" style="background: linear-gradient(135deg, var(--ai-glow), var(--primary));" onclick="startSenseiSession()" data-sk="PoprosiЕҘ o zadanie" data-en="Ask for task">PoprosiЕҘ o zadanie</button></div>
        <div id="senseiRun" class="hidden"><div class="info-box"><div id="senseiTaskText">...</div></div><textarea id="senseiUserInput" rows="4"></textarea><button class="btn btn-primary" id="btnSenseiSubmit" onclick="submitToSensei()" data-sk="OdoslaЕҘ" data-en="Submit">OdoslaЕҘ</button><div id="senseiEvaluation" class="hidden info-box"><div id="senseiEvalText"></div><button class="btn btn-outline" style="margin-top: 15px;" onclick="closeSenseiSession()" data-sk="ZatvoriЕҘ" data-en="Close">ZatvoriЕҘ</button></div></div>
    </div>

    <div id="tab-translate" class="tab">
        <h2 data-sk="AI Preklad" data-en="AI Translate">AI Preklad</h2>
        <div class="info-box"><select id="transDirection"><option value="sk|ja">SK вһЎпёҸ JA</option><option value="ja|sk">JA вһЎпёҸ SK</option><option value="en|ja">EN вһЎпёҸ JA</option></select><textarea id="transInput" rows="3"></textarea><div style="display:flex; gap:10px;"><button class="btn btn-primary" style="flex:1;" onclick="translateText()" data-sk="PreloЕҫiЕҘ" data-en="Translate">PreloЕҫiЕҘ</button><button class="btn-ai" style="flex:1;" onclick="analyzeWithAI()" data-sk="вңЁ AnalГҪza" data-en="вңЁ Analysis">вңЁ AnalГҪza</button></div><div id="transOutput" style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.2); border-radius:12px; min-height:40px;"></div><button id="btnTransAudio" class="btn btn-audio hidden" style="width:100%; margin-top:10px;" onclick="playTransAudio()" data-sk="рҹ”Ҡ Zvuk" data-en="рҹ”Ҡ Audio">рҹ”Ҡ Zvuk</button></div>
    </div>

    <div id="tab-profile" class="tab"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h2 data-sk="Profil" data-en="Profile">Profil</h2><button class="btn btn-danger" onclick="logoutUser()" data-sk="OdhlГЎsiЕҘ" data-en="Logout">OdhlГЎsiЕҘ</button></div><div class="info-box"><input type="text" id="profileNickname" onblur="updateNickname()"></div><div id="historyList"></div></div>
</div>

<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/database.js"></script>
<script src="js/train.js"></script>
<script src="js/sensei.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
