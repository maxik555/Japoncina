<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japonský Tréning - Verzia 2.3.3</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --locked: #334155; --border: #334155; --card-back: #1e3a8a;
        }

        [data-theme="light"] { --bg-dark: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --primary: #2563eb; --border: #cbd5e1; --card-back: #e2e8f0; }
        [data-theme="sharingan"] { --bg-dark: #1a0505; --bg-card: #2b0a0a; --text-main: #fca5a5; --text-muted: #ef4444; --primary: #dc2626; --border: #7f1d1d; --card-back: #450a0a; }
        [data-theme="konoha"] { --bg-dark: #064e3b; --bg-card: #14532d; --text-main: #d1fae5; --text-muted: #6ee7b7; --primary: #10b981; --border: #065f46; --card-back: #065f46; }
        [data-theme="uzumaki"] { --bg-dark: #7c2d12; --bg-card: #9a3412; --text-main: #fff7ed; --text-muted: #fdba74; --primary: #f97316; --border: #c2410c; --card-back: #ea580c; }
        [data-theme="nara"] { --bg-dark: #171717; --bg-card: #262626; --text-main: #e5e5e5; --text-muted: #a3a3a3; --primary: #525252; --border: #404040; --card-back: #404040; }

        body { font-family: 'Nunito', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.3s, color 0.3s; -webkit-user-select: none; }
        .app-container { background: var(--bg-card); width: 100%; max-width: 750px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; transition: background 0.3s; position: relative; }
        
        .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-dark); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .rpg-stat { text-align: center; }
        .rpg-val { font-size: 18px; font-weight: 800; color: var(--primary); }
        .rpg-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .lang-flags span { cursor: pointer; font-size: 24px; transition: 0.2s; padding: 0 5px; }
        .lang-flags span.inactive { opacity: 0.3; filter: grayscale(100%); }
        
        .nav { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .nav::-webkit-scrollbar { display: none; }
        .btn-nav { flex: 1; min-width: 80px; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 12px; text-align: center; white-space: nowrap; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* MODAL / OVERLAY CSS */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 600px; max-height: 80vh; border-radius: 20px; padding: 25px; overflow-y: auto; border: 1px solid var(--border); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; color: var(--text-muted); }

        .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .lesson-node { padding: 15px 10px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .node-unlocked { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); color: var(--text-main); }
        .node-unlocked:hover { background: var(--primary); color: white; }
        .node-locked { background: var(--bg-dark); color: var(--text-muted); border-color: var(--border); opacity: 0.7; cursor: not-allowed; }
        .boss-node { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); color: var(--warning); }
        
        .tab { display: none; } .tab.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(5px)} to{opacity:1; transform:translateY(0)} }
        
        input[type="text"], input[type="number"], input[type="email"], input[type="password"], select, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg-dark); color: var(--text-main); font-size: 16px; margin-bottom: 15px; box-sizing: border-box; transition: 0.3s; font-family: 'Nunito', sans-serif; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-main); }
        .btn-audio { background: transparent; border: 2px solid var(--primary); color: var(--primary); width: auto; padding: 10px 20px; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        
        .info-box { background: var(--bg-dark); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        .flashcard-container { perspective: 1000px; width: 100%; height: 320px; margin-bottom: 20px; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; border: 2px solid var(--border); text-align: center; transition: 0.3s; }
        .card-front { background: var(--bg-dark); }
        .card-back { background: var(--card-back); transform: rotateY(180deg); border-color: var(--primary); }
        
        .test-header { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
        .word-display { font-size: 40px; font-weight: 900; text-align: center; margin: 20px 0; }
        .feedback-box { padding: 15px; border-radius: 12px; margin-bottom: 15px; display: none; text-align: center; font-size: 18px; }
        .fb-correct { background: rgba(16, 185, 129, 0.2); color: var(--success); display: block; border: 1px solid var(--success); }
        .fb-wrong { background: rgba(239, 68, 68, 0.2); color: var(--danger); display: block; border: 1px solid var(--danger); }
        
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-quiz { background: var(--bg-dark); border: 2px solid var(--border); padding: 20px 10px; border-radius: 12px; font-size: 18px; cursor: pointer; color: var(--text-main); font-weight: bold; }
        .btn-quiz.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        .btn-quiz.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); }
        
        .timer-container { width: 100%; height: 8px; background: var(--bg-dark); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: var(--warning); transition: width 0.1s linear; }
        .hidden { display: none !important; }

        .history-item { background: var(--bg-dark); border: 2px solid var(--border); border-left-width: 6px; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .history-item.passed { border-left-color: var(--success); }
        .history-item.failed { border-left-color: var(--danger); }
        
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .spinner { border: 6px solid var(--border); border-top: 6px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .detail-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .detail-table th { text-align: left; color: var(--text-muted); padding: 8px; border-bottom: 1px solid var(--border); }
        .detail-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
        .ans-correct { color: var(--success); font-weight: bold; }
        .ans-wrong { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body data-theme="dark">

<div id="loadingOverlay"><div class="spinner"></div><h2 id="loadingText">Spúšťam appku...</h2></div>

<div id="historyOverlay" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeHistoryDetail()">×</span>
        <h2 id="detailTitle" style="margin-top:0;">Detail testu</h2>
        <div id="detailStats" style="color:var(--text-muted); margin-bottom:15px;"></div>
        <div id="detailList"></div>
    </div>
</div>

<div id="auth-container" class="app-container" style="display: none; max-width: 400px; text-align: center;">
    <h2 style="font-size:32px; margin-bottom:10px;">🏯 Dódžó</h2>
    <p style="color:var(--text-muted); margin-bottom:25px;" data-sk="Prihlás sa pre ukladanie postupu." data-en="Sign in to save progress.">Prihlás sa pre ukladanie postupu.</p>
    <input type="email" id="authEmail" placeholder="Tvoj E-mail">
    <input type="password" id="authPass" placeholder="Heslo (min. 6 znakov)">
    <button class="btn btn-primary" onclick="loginUser()">Prihlásiť sa</button>
    <button class="btn btn-outline" onclick="registerUser()">Nový účet</button>
    <p id="authError" style="color:var(--danger); font-size:14px; margin-top:15px;"></p>
</div>

<div id="main-app" class="app-container" style="display: none;">
    <div class="topbar">
        <div style="display:flex; gap:15px;">
            <div class="rpg-stat"><div class="rpg-val" id="uiRank">🥷 Genin</div><div class="rpg-label">Hodnosť</div></div>
            <div class="rpg-stat"><div class="rpg-val" id="uiLevel">1</div><div class="rpg-label">Level</div></div>
            <div class="rpg-stat"><div class="rpg-val" id="uiXp">0</div><div class="rpg-label">XP</div></div>
            <div class="rpg-stat"><div class="rpg-val" id="uiStreak" style="color:var(--warning)">0 🔥</div><div class="rpg-label">Streak</div></div>
        </div>
        <div class="lang-flags"><span id="flag-sk" onclick="setLang('sk')">🇸🇰</span><span id="flag-en" onclick="setLang('en')">🇬🇧</span></div>
    </div>

    <div class="nav">
        <button class="btn-nav active" onclick="switchTab('map')" id="btnTabMap">🗺️ Cesta</button>
        <button class="btn-nav" onclick="switchTab('learn')" id="btnTabLearn">🎴 Učenie</button>
        <button class="btn-nav" onclick="switchTab('train')" id="btnTabTrain">📝 Test</button>
        <button class="btn-nav" onclick="switchTab('translate')" id="btnTabTranslate">🈯 Prekladač</button>
        <button class="btn-nav" onclick="switchTab('profile')" id="btnTabProfile">👤 Profil</button>
    </div>

    <div id="tab-map" class="tab active"><h2 style="margin-top:0;">Tvoja cesta</h2><div id="lessonMap" class="map-grid"></div></div>

    <div id="tab-learn" class="tab">
        <div id="learnSetup">
            <h2>Tréning</h2>
            <div class="info-box"><label>Lekcia:</label><select id="learnLessonSelect"></select><button class="btn btn-primary" onclick="startLearn('cards')">🎴 Kartičky</button></div>
            <div class="info-box"><button class="btn btn-outline" onclick="showUnlockedList()">📄 Slovník</button></div>
        </div>
        <div id="learnCardsRun" class="hidden">
            <div class="test-header"><span id="fcProgress"></span></div>
            <div class="flashcard-container" onclick="flipCard()">
                <div class="flashcard" id="fcElement">
                    <div class="card-face card-front"><div id="fcImg" class="fc-img"></div><div id="fcFrontSk" class="fc-sk"></div></div>
                    <div class="card-face card-back"><div id="fcBackRomaji" class="fc-romaji"></div><div id="fcBackKana"></div><div id="fcBackKanji" style="font-size:24px;"></div></div>
                </div>
            </div>
            <div style="text-align: center; margin-bottom: 15px;"><button class="btn btn-audio" onclick="playAudioText(document.getElementById('fcBackRomaji').innerText)">🔊 Zvuk</button></div>
            <div style="display: flex; gap: 10px;"><button class="btn" style="background:var(--bg-dark);" onclick="prevFc()">⬅️</button><button class="btn btn-success" onclick="nextFc()">➡️</button></div>
            <button class="btn btn-outline" onclick="closeLearn()">Zrušiť</button>
        </div>
        <div id="learnListRun" class="hidden">
            <button class="btn btn-outline" onclick="closeLearn()">Späť</button>
            <div id="vocabListBody" style="overflow-y:auto; max-height:60vh;"></div>
        </div>
    </div>

    <div id="tab-train" class="tab">
        <div id="trainSetup">
            <div style="display: flex; gap: 5px; margin-bottom: 15px;"><button class="btn-nav" id="btnModeUnlock" onclick="selectTestModeUI('unlock')">🔓 Odomknúť</button><button class="btn-nav" id="btnModeQuiz" onclick="selectTestModeUI('quiz')">⏱️ Kvíz</button><button class="btn-nav" id="btnModeFree" onclick="selectTestModeUI('free')">🏋️ Voľný</button></div>
            <div id="setupUnlock" class="setup-section hidden"><button class="btn btn-primary" onclick="startTraining('unlock')">Spustiť (90% na postup)</button></div>
            <div id="setupQuiz" class="setup-section hidden"><input type="number" id="quizCount" value="20" placeholder="Počet slov"><button class="btn btn-warning" onclick="startTraining('quiz')">Spustiť Kvíz</button></div>
            <div id="setupFree" class="setup-section hidden"><input type="number" id="freeCount" value="20" placeholder="Počet slov"><button class="btn btn-success" onclick="startTraining('free')">Spustiť tréning</button></div>
        </div>
        <div id="trainRun" class="hidden">
            <div class="test-header"><span id="testProgress"></span><span>✅ <span id="testCorrect">0</span> | ❌ <span id="testWrong">0</span></span></div>
            <div id="quizTimerContainer" class="timer-container hidden"><div id="quizTimerBar" class="timer-bar"></div></div>
            <div class="word-display" id="twWord"></div>
            <div id="twFeedback" class="feedback-box"></div>
            <div id="classicInputArea"><input type="text" id="twInput" placeholder="Preklad..." autocomplete="off"><button class="btn btn-primary" id="twSubmitBtn" onclick="checkTrainAnswer()">Potvrdiť</button></div>
            <div id="quizInputArea" class="quiz-grid hidden"><button class="btn-quiz" id="qb0" onclick="checkQuizAnswer(0)"></button><button class="btn-quiz" id="qb1" onclick="checkQuizAnswer(1)"></button><button class="btn-quiz" id="qb2" onclick="checkQuizAnswer(2)"></button><button class="btn-quiz" id="qb3" onclick="checkQuizAnswer(3)"></button></div>
            <button class="btn btn-success hidden" id="twNextBtn" onclick="nextTrainWord()">Ďalšie ➡️</button>
        </div>
        <div id="trainResult" class="hidden text-center"><h1 id="trScore">0%</h1><p id="trMessage"></p><button class="btn btn-primary" onclick="closeTraining()">Späť</button></div>
    </div>

    <div id="tab-translate" class="tab">
        <textarea id="transInput" rows="3" placeholder="Sem napíš text..."></textarea>
        <button class="btn btn-primary" onclick="translateText()">Preložiť</button>
        <div id="transOutput" class="info-box" style="min-height:50px; margin-top:10px;"></div>
    </div>

    <div id="tab-profile" class="tab">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>Profil</h2><button class="btn btn-danger" onclick="logoutUser()" style="width:auto;">Odhlásiť</button></div>
        <div class="info-box"><input type="text" id="profileNickname" placeholder="Prezývka" onblur="updateNickname()"></div>
        <h3>Archív testov</h3><div id="historyList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDEJcyJE7H9rlqWYPPit8r83sIgLG3w1OI", authDomain: "learning-japanase.firebaseapp.com",
        projectId: "learning-japanase", storageBucket: "learning-japanase.firebasestorage.app",
        messagingSenderId: "555713188608", appId: "1:555713188608:web:d8375f9ef216321d2319e5"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const dbFirestore = firebase.firestore();

    let db = [];
    let state = { unlockedLesson: 1, xp: 0, streak: 0, lastDate: null, theme: 'dark', history: [], nickname: '' };
    let currentUser = null; let currentLang = localStorage.getItem('finale_lang') || 'sk';
    let japaneseVoice = null; let currentFullResults = [];

    // --- AUDIO (FÁZA 1 & 2 FIX) ---
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        japaneseVoice = voices.find(v => v.lang.includes('ja-JP') && v.name.includes('Female')) || 
                        voices.find(v => v.lang.includes('ja-JP'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function playAudioText(text, lang = 'ja-JP') {
        if (!text) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = lang;
        speech.rate = lang === 'ja-JP' ? 0.9 : 1.0;
        if (lang === 'ja-JP' && japaneseVoice) speech.voice = japaneseVoice;
        window.speechSynthesis.speak(speech);
    }

    // --- NORMALIZÁCIA (FUZZY) ---
    function normalizeString(str) {
        if (!str) return "";
        return str.toLowerCase().replace(/[\s\-\!\?\,\.\"\']/g, "").trim();
    }

    // --- CACHING DB (FÁZA 2) ---
    async function fetchDatabaseFromCloud() {
        const cached = localStorage.getItem('cached_db');
        if (cached) {
            db = JSON.parse(cached);
            renderMap();
            return;
        }

        try {
            const res = await fetch('./Kompletna_Databaza_3000_Slov.xlsx?v=' + Date.now());
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
            db = rows.map((r, i) => ({
                id: i + 1, lekcia: parseInt(r['Lekcia']) || 0, sk: r['Slovenský'], en: r['Anglický'] || r['Slovenský'],
                romaji: String(r['Rómadži']), kana: r['Hiragana / Katakana'] || '-', kanji: r['Kandži'] || '-'
            })).filter(w => w.sk && w.romaji && w.lekcia > 0);
            
            localStorage.setItem('cached_db', JSON.stringify(db));
            renderMap();
        } catch (e) { console.error("DB Error", e); }
    }

    // --- CORE LOGIC ---
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            await loadUserData();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    });

    async function loadUserData() {
        const snap = await dbFirestore.collection('users').doc(currentUser.uid).get();
        if (snap.exists) state = { ...state, ...snap.data() };
        document.getElementById('profileNickname').value = state.nickname || '';
        updateUI();
        await fetchDatabaseFromCloud();
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function saveState() {
        updateUI();
        if (currentUser) await dbFirestore.collection('users').doc(currentUser.uid).set(state);
    }

    function updateUI() {
        let lvl = Math.floor(state.xp / 500) + 1;
        document.getElementById('uiLevel').innerText = lvl;
        document.getElementById('uiXp').innerText = state.xp;
        document.getElementById('uiStreak').innerText = state.streak + " 🔥";
        renderHistory();
    }

    // --- TEST LOGIC (UPRAVENÁ PRE DETAILNÚ HISTÓRIU) ---
    function checkTrainAnswer() {
        let rawInput = document.getElementById('twInput').value.trim();
        let input = normalizeString(rawInput);
        let w = testQueue[currentIdx];
        let fb = document.getElementById('twFeedback');

        let valid = w.romaji.split('/').map(s => normalizeString(s));
        if (w.kana !== '-') valid = valid.concat(w.kana.split('/').map(s => normalizeString(s)));

        let isCorrect = valid.includes(input);
        
        // Ukladanie pre Fázu 2 Detail
        currentFullResults.push({
            sk: w.sk, romaji: w.romaji, userAns: rawInput || "---", isCorrect: isCorrect
        });

        if (isCorrect) {
            fb.innerHTML = "✅ Správne!"; fb.className = 'feedback-box fb-correct';
            playAudioText(w.romaji);
        } else {
            fb.innerHTML = `❌ Správne: ${w.romaji}`; fb.className = 'feedback-box fb-wrong';
            mistakes++;
        }

        document.getElementById('twInput').disabled = true;
        document.getElementById('twSubmitBtn').classList.add('hidden');
        document.getElementById('twNextBtn').classList.remove('hidden');
    }

    function endTraining() {
        document.getElementById('trainRun').classList.add('hidden');
        document.getElementById('trainResult').classList.remove('hidden');
        let perc = Math.round(((testQueue.length - mistakes) / testQueue.length) * 100);
        document.getElementById('trScore').innerText = perc + "%";

        // Uloženie do histórie s Full Results
        state.history.unshift({
            date: Date.now(), lesson: currentUnlockTarget || "Quiz",
            score: perc, passed: perc >= 90,
            fullResults: JSON.parse(JSON.stringify(currentFullResults)) // hlboká kópia
        });
        if (state.history.length > 30) state.history.pop();

        if (perc >= 90) {
            if (currentTestType === 'unlock' && state.unlockedLesson === currentUnlockTarget) state.unlockedLesson++;
            state.xp += testQueue.length;
        }
        saveState();
    }

    // --- DETAIL TEST OVERLAY ---
    function showTestDetail(index) {
        const h = state.history[index];
        if (!h || !h.fullResults) return;

        document.getElementById('detailTitle').innerText = `Lekcia ${h.lesson} (${new Date(h.date).toLocaleDateString()})`;
        document.getElementById('detailStats').innerText = `Úspešnosť: ${h.score}% | Slov: ${h.fullResults.length}`;
        
        let html = `<table class="detail-table"><tr><th>Slovo</th><th>Tvoja odpoveď</th><th>Správne</th></tr>`;
        h.fullResults.forEach(r => {
            html += `<tr>
                <td>${r.sk}</td>
                <td class="${r.isCorrect ? 'ans-correct' : 'ans-wrong'}">${r.userAns}</td>
                <td style="color:var(--primary)">${r.romaji}</td>
            </tr>`;
        });
        html += `</table>`;
        
        document.getElementById('detailList').innerHTML = html;
        document.getElementById('historyOverlay').style.display = 'flex';
    }

    function closeHistoryDetail() { document.getElementById('historyOverlay').style.display = 'none'; }

    function renderHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        state.history.forEach((h, i) => {
            let div = document.createElement('div');
            div.className = `history-item ${h.passed ? 'passed' : 'failed'}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <span>Lekcia ${h.lesson} - ${h.score}%</span>
                    <button onclick="showTestDetail(${i})" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold;">DETAIL</button>
                </div>`;
            container.appendChild(div);
        });
    }

    // --- ZVYŠOK FUNKCIÍ (NAV, MAP, atď.) ---
    function switchTab(t) {
        document.querySelectorAll('.tab, .btn-nav').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.getElementById('btnTab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    function renderMap() {
        const map = document.getElementById('lessonMap'); map.innerHTML = '';
        const lessons = [...new Set(db.map(w => w.lekcia))].sort((a,b)=>a-b);
        lessons.forEach(l => {
            let unlocked = l <= state.unlockedLesson;
            let div = document.createElement('div');
            div.className = `lesson-node ${unlocked ? 'node-unlocked' : 'node-locked'}`;
            div.innerText = 'L' + l;
            if (unlocked) div.onclick = () => { switchTab('learn'); startLearn('cards', l); };
            map.appendChild(div);
        });
    }

    // Pomocné funkcie pre štart
    function startTraining(type) {
        currentTestType = type; mistakes = 0; currentIdx = 0; currentFullResults = [];
        if (type === 'unlock') {
            currentUnlockTarget = state.unlockedLesson;
            testQueue = db.filter(w => w.lekcia === currentUnlockTarget).sort(()=>0.5-Math.random()).slice(0, 10);
        } else {
            testQueue = db.slice(0, 20).sort(()=>0.5-Math.random());
        }
        document.getElementById('trainSetup').classList.add('hidden');
        document.getElementById('trainRun').classList.remove('hidden');
        loadTrainWord();
    }
    
    function loadTrainWord() {
        let w = testQueue[currentIdx];
        document.getElementById('twWord').innerText = w.sk;
        document.getElementById('twInput').value = '';
        document.getElementById('twInput').disabled = false;
        document.getElementById('twInput').focus();
        document.getElementById('twFeedback').className = 'hidden';
        document.getElementById('twSubmitBtn').classList.remove('hidden');
        document.getElementById('twNextBtn').classList.add('hidden');
        document.getElementById('testProgress').innerText = `${currentIdx+1}/${testQueue.length}`;
    }

    function nextTrainWord() {
        currentIdx++;
        if (currentIdx < testQueue.length) loadTrainWord();
        else endTraining();
    }

    function closeTraining() {
        document.getElementById('trainRun').classList.add('hidden');
        document.getElementById('trainResult').classList.add('hidden');
        document.getElementById('trainSetup').classList.remove('hidden');
    }

    function selectTestModeUI(m) {
        document.querySelectorAll('.setup-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('setup' + m.charAt(0).toUpperCase() + m.slice(1)).classList.remove('hidden');
    }

    async function loginUser() {
        try { await auth.signInWithEmailAndPassword(document.getElementById('authEmail').value, document.getElementById('authPass').value); }
        catch(e) { document.getElementById('authError').innerText = e.message; }
    }
    
    async function registerUser() {
        try { await auth.createUserWithEmailAndPassword(document.getElementById('authEmail').value, document.getElementById('authPass').value); }
        catch(e) { document.getElementById('authError').innerText = e.message; }
    }
    
    function logoutUser() { auth.signOut(); }
    function updateNickname() { state.nickname = document.getElementById('profileNickname').value; saveState(); }
    function setLang(l) { currentLang = l; localStorage.setItem('finale_lang', l); }

</script>
</body>
</html>
