<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japonský Tréning - Master Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        .test-overlay { position: fixed; inset: 0; background: rgba(10, 15, 30, 0.90); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .test-overlay.hidden { display: none !important; }
        .test-modal { background: var(--bg-dark); padding: 30px 25px; border-radius: 16px; width: 90%; max-width: 500px; position: relative; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-height: 90vh; overflow-y: auto; text-align: center; }
        .btn-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 28px; cursor: pointer; line-height: 1; }
        
        .mic-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 28px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
        .mic-btn.active { background: var(--danger); box-shadow: 0 0 20px var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .story-box { line-height: 1.8; font-size: 18px; text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border-left: 4px solid var(--ai-glow); margin-top: 20px; }
        .story-word { cursor: pointer; border-bottom: 1px dashed var(--text-muted); }
        .story-word:hover { color: var(--primary); }

        .nav { gap: 5px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .btn-nav { padding: 10px 15px; font-size: 14px; white-space: nowrap; flex-shrink: 0; }
    </style>
</head>
<body data-theme="dark">

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h2 id="loadingText">Načítavam dódžó...</h2>
</div>

<div id="auth-container" class="app-container" style="display:none; max-width:400px;">
    <h2 style="text-align:center;">🏯 Dódžó</h2>
    <button style="margin-bottom:20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: black; border: none; font-weight: bold; padding: 12px; border-radius: 8px; cursor: pointer;" onclick="window.loginWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 20px;">
        <span>Prihlásiť cez Google</span>
    </button>
    <div style="text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 20px;">— alebo —</div>
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPass" placeholder="Heslo">
    <button class="btn btn-primary" onclick="window.loginUser()">Vstúpiť</button>
    <button class="btn btn-outline" style="margin-top:10px;" onclick="window.registerUser()">Vytvoriť účet</button>
    <p id="authError" style="color:var(--danger); text-align:center; margin-top:15px;"></p>
</div>

<div id="main-app" class="app-container" style="display:none;">
    <div class="topbar">
        <div style="flex:1;">
            <div style="display:flex; gap:15px; margin-bottom:5px;">
                <div class="rpg-stat"><div class="rpg-val" id="uiRank">🥷 Genin</div><div class="rpg-label">Hodnosť</div></div>
                <div class="rpg-stat"><div class="rpg-val" id="uiLevel">1</div><div class="rpg-label">Level</div></div>
                <div class="rpg-stat"><div class="rpg-val" id="uiStreak">0 🔥</div><div class="rpg-label">Streak</div></div>
            </div>
            <div class="xp-bar-container"><div id="xpBar" class="xp-bar-fill"></div></div>
        </div>
        <div class="lang-flags" style="margin-left:20px;"><span id="flag-sk" onclick="window.setLang('sk')">🇸🇰</span><span id="flag-en" onclick="window.setLang('en')">🇬🇧</span></div>
    </div>

    <div class="nav">
        <button class="btn-nav active" onclick="window.switchTab('map')" id="btnTabMap">🗺️ Mapa</button>
        <button class="btn-nav" onclick="window.switchTab('learn')" id="btnTabLearn">🎴 Učenie</button>
        <button class="btn-nav" onclick="window.switchTab('train')" id="btnTabTrain">📝 Test</button>
        <button class="btn-nav" onclick="window.switchTab('stories')" id="btnTabStories">⛩️ Čitáreň</button>
        <button class="btn-nav" onclick="window.switchTab('live')" id="btnTabLive">🎙️ Hovory</button>
        <button class="btn-nav" onclick="window.switchTab('grammar')" id="btnTabGrammar">⛩️ Gram.</button>
        <button class="btn-nav" onclick="window.switchTab('profile')" id="btnTabProfile">👤 Profil</button>
    </div>

    <div id="tab-map" class="tab active">
        <h2 style="margin-top:0;">Tvoja cesta</h2>
        <div id="lessonMap" class="map-grid"></div>
    </div>

    <div id="tab-learn" class="tab">
        <div id="learnSetup">
            <h2>Učebné materiály</h2>
            <div class="info-box">
                <label>VYBER LEKCIU:</label>
                <select id="learnLessonSelect" style="margin-top:5px; margin-bottom:15px;"></select>
                <button class="btn btn-primary" onclick="window.startLearn('cards')">Spustiť kartičky</button>
            </div>
            <button class="btn-action" onclick="window.openMyDictionary()">Otvoriť môj slovník</button>
        </div>
        <div id="learnCardsRun" class="hidden">
            <div class="test-header"><span id="fcProgress"></span></div>
            <div class="flashcard-container" onclick="window.flipCard()">
                <div class="flashcard" id="fcElement">
                    <div class="card-face card-front"><div id="fcImg" style="font-size:50px; margin-bottom:10px;"></div><div id="fcFrontSk" style="font-size:28px; font-weight:800;"></div></div>
                    <div class="card-face card-back"><div id="fcBackRomaji" style="font-size:24px; color:var(--primary); font-weight:bold;"></div><div id="fcBackKana"></div><div id="fcBackKanji" style="font-size:32px;"></div></div>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-outline" onclick="window.prevFc()">Späť</button>
                <button class="btn btn-success" onclick="window.nextFc()">Ďalšia</button>
            </div>
            <button class="btn btn-outline" style="margin-top:10px; border:none;" onclick="window.closeLearn()">Zavrieť</button>
        </div>
    </div>

    <div id="tab-train" class="tab">
        <div id="trainSetup">
            <h2>Tréningová aréna</h2>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button class="btn-nav active" id="btnModeUnlock" onclick="window.selectTestModeUI('unlock')">🔓 Postup</button>
                <button class="btn-nav" id="btnModeSmart" onclick="window.selectTestModeUI('smart')">🧠 Chytrý</button>
            </div>
            <div id="setupUnlock" class="setup-section">
                <button class="btn btn-primary" onclick="window.startTraining('unlock')">Skúška na novú úroveň</button>
            </div>
            <div id="setupSmart" class="setup-section hidden">
                <button class="btn-action" onclick="window.startSmartTraining()">SPUSTIŤ CHYTRÝ TRÉNING</button>
            </div>
        </div>
    </div>

    <div id="tab-stories" class="tab">
        <h2>⛩️ AI Čitáreň</h2>
        <button class="btn-action" onclick="window.generateAIStory()">GENEROVAŤ NOVÝ PRÍBEH</button>
        <div id="storyContainer" class="hidden">
            <div class="story-box" id="storyContent"></div>
            <div id="storyTranslation" style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.2); border-radius:8px; font-style:italic;"></div>
        </div>
    </div>

    <div id="tab-live" class="tab">
        <h2>🎙️ Sensei Live</h2>
        <div class="info-box" style="text-align:center;">
            <div id="liveStatus">Pripravený...</div>
            <button id="micBtn" class="mic-btn" onclick="window.toggleLiveSensei()">🎤</button>
            <div id="liveTranscript" style="margin-top:20px; text-align:left; font-size:15px; max-height:200px; overflow-y:auto; padding:10px; background:rgba(0,0,0,0.3); border-radius:8px;"></div>
        </div>
    </div>

    <div id="tab-grammar" class="tab">
        <h2>⛩️ Gramatika</h2>
        <div id="grammarSetup" class="info-box">
            <select id="grammarLessonSelect"></select>
            <button class="btn btn-primary" style="margin-top:15px;" onclick="window.startGrammarTest()">Spustiť gramatiku</button>
        </div>
    </div>

    <div id="tab-profile" class="tab">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Môj progres</h2>
            <button class="btn btn-danger" onclick="window.logoutUser()">Odhlásiť</button>
        </div>
        <div class="info-box">
            <label>PREZÝVKA:</label>
            <input type="text" id="profileNickname" onblur="window.updateNickname()">
        </div>
        <div id="profLevelText" style="font-weight:bold; color:var(--primary); margin-top:20px;">Level 1</div>
        <div id="profXpText" style="font-size:12px; color:var(--text-muted);">0 / 500 XP</div>
        <div class="xp-bar-container"><div id="profXpBar" class="xp-bar-fill"></div></div>
        <h3 style="margin-top:30px;">História skúšok</h3>
        <div id="historyList"></div>
    </div>
</div>

<div id="trainRun" class="test-overlay hidden">
    <div class="test-modal">
        <button class="btn-close" onclick="window.abortTraining()">&times;</button>
        <div class="test-header"><span id="testProgress"></span><span id="testScoreDisplay"></span></div>
        <div id="twWord" class="word-display" style="margin:20px 0;"></div>
        <div id="twFeedback" class="feedback-box"></div>
        <div id="classicInputArea">
            <input type="text" id="twInput" autocomplete="off" placeholder="Tvoja odpoveď...">
            <button class="btn-action" id="twSubmitBtn" onclick="window.checkTrainAnswer()">POTVRDIŤ</button>
        </div>
        <button class="btn-action hidden" id="twNextBtn" onclick="window.nextTrainWord()">ĎALŠIE SLOVO ➔</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/train-utils.js"></script>
<script src="js/train-vocab.js"></script>
<script src="js/ai-content.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
